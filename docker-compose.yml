version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: pregrade
      POSTGRES_PASSWORD: pregrade
      POSTGRES_DB: pregrade
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pregrade"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
